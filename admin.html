<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - Walt 的个人主页</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet" />
    <script src="config.js"></script>
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-hover: #1a1a25;
            --accent-green: #00ff9f;
            --accent-blue: #00d4ff;
            --accent-red: #ff4444;
            --text-primary: #e0e0e0;
            --text-secondary: #8a8a9a;
            --border-color: #2a2a3a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; }
        
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
        .login-box h1 { text-align: center; margin-bottom: 30px; color: var(--accent-green); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px 15px; background: var(--bg-dark); border: 1px solid var(--border-color);
            border-radius: 8px; color: var(--text-primary); font-size: 1rem;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent-green); }
        .btn { width: 100%; padding: 12px; background: var(--accent-green); border: none; border-radius: 8px; color: #000; font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .btn:hover { opacity: 0.9; }
        .btn-secondary { background: var(--bg-hover); color: var(--text-primary); border: 1px solid var(--border-color); }
        
        .admin-container { display: none; }
        .admin-container.active { display: block; }
        .admin-header { background: var(--bg-card); border-bottom: 1px solid var(--border-color); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .admin-header h1 { font-size: 1.2rem; color: var(--accent-green); }
        .admin-nav { display: flex; gap: 10px; }
        .admin-nav button { padding: 8px 16px; background: transparent; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-secondary); cursor: pointer; }
        .admin-nav button:hover, .admin-nav button.active { border-color: var(--accent-green); color: var(--accent-green); }
        
        .admin-content { padding: 30px; max-width: 1200px; margin: 0 auto; }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        
        .editor-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: 70vh; }
        .editor-panel { display: flex; flex-direction: column; }
        .editor-panel h3 { margin-bottom: 15px; color: var(--accent-blue); }
        .markdown-editor { flex: 1; padding: 15px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; resize: none; line-height: 1.6; }
        .markdown-editor:focus { outline: none; border-color: var(--accent-green); }
        .preview-panel { flex: 1; padding: 15px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; overflow-y: auto; }
        .preview-panel h3 { margin-bottom: 15px; color: var(--accent-blue); }
        .preview-content { line-height: 1.8; color: var(--text-secondary); }
        
        .image-upload-area { border: 2px dashed var(--border-color); border-radius: 8px; padding: 20px; text-align: center; margin-bottom: 15px; cursor: pointer; }
        .image-upload-area:hover { border-color: var(--accent-green); }
        .image-upload-area input { display: none; }
        
        .blog-list-admin { display: flex; flex-direction: column; gap: 15px; }
        .blog-item-admin { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .blog-item-admin h3 { font-size: 1rem; margin-bottom: 5px; }
        .blog-item-admin p { color: var(--text-secondary); font-size: 0.85rem; }
        .blog-item-admin .actions { display: flex; gap: 10px; }
        .btn-small { padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; border: none; }
        .btn-edit { background: var(--accent-blue); color: #000; }
        .btn-delete { background: var(--accent-red); color: #fff; }
        
        .settings-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; }
        .settings-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 25px; }
        .settings-card h3 { margin-bottom: 20px; color: var(--accent-blue); }
        .avatar-preview { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-green), var(--accent-blue)); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 3rem; overflow: hidden; }
        
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-secondary); cursor: pointer; }
        .tab-btn.active { border-color: var(--accent-green); color: var(--accent-green); }
        
        .toast { position: fixed; top: 20px; right: 20px; padding: 15px 25px; background: var(--accent-green); color: #000; border-radius: 8px; font-weight: bold; transform: translateX(200%); transition: transform 0.3s; z-index: 1000; }
        .toast.show { transform: translateX(0); }
        .toast.error { background: var(--accent-red); color: #fff; }
        
        @media (max-width: 768px) {
            .editor-container { grid-template-columns: 1fr; }
            .settings-grid { grid-template-columns: 1fr; }
            .admin-nav { display: none; }
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div class="login-container" id="loginPage">
        <div class="login-box">
            <h1>🔐 后台管理</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label>请输入访问密码</label>
                    <input type="password" id="passwordInput" placeholder="输入密码..." required>
                </div>
                <button type="submit" class="btn">进入后台</button>
            </form>
        </div>
    </div>

    <!-- 后台管理 -->
    <div class="admin-container" id="adminPage">
        <header class="admin-header">
            <h1>⚙️ 后台管理</h1>
            <nav class="admin-nav">
                <button class="active" onclick="showSection('blog')">博客管理</button>
                <button onclick="showSection('settings')">网站设置</button>
                <button onclick="logout()">退出</button>
            </nav>
        </header>

        <div class="admin-content">
            <!-- 博客管理 -->
            <div class="admin-section active" id="section-blog">
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="showBlogTab('list')">博客列表</button>
                    <button class="tab-btn" onclick="showBlogTab('edit')">撰写博客</button>
                </div>

                <div id="blogListTab">
                    <div class="blog-list-admin" id="blogListAdmin"></div>
                </div>

                <div id="blogEditTab" style="display: none;">
                    <div class="form-group">
                        <label>文章标题</label>
                        <input type="text" id="articleTitle" placeholder="输入文章标题...">
                    </div>
                    <div class="form-group">
                        <label>文章分类</label>
                        <select id="articleCategory">
                            <option value="ai">AI 大模型</option>
                            <option value="tools">工具技巧</option>
                            <option value="finance">财经分析</option>
                        </select>
                    </div>
                    <div class="editor-container">
                        <div class="editor-panel">
                            <h3>📝 Markdown 编辑器</h3>
                            <textarea class="markdown-editor" id="markdownEditor" placeholder="使用 Markdown 语法编写文章..."></textarea>
                        </div>
                        <div class="editor-panel">
                            <h3>👁️ 预览</h3>
                            <div class="preview-panel">
                                <div class="preview-content" id="previewContent"><p style="color: var(--text-secondary);">预览内容将在此显示...</p></div>
                            </div>
                        </div>
                    </div>
                    <div style="margin-top: 20px;">
                        <button class="btn" onclick="saveBlog()">💾 保存文章</button>
                        <button class="btn btn-secondary" onclick="showBlogTab('list')">取消</button>
                    </div>
                </div>
            </div>

            <!-- 网站设置 -->
            <div class="admin-section" id="section-settings">
                <div class="settings-grid">
                    <div class="settings-card">
                        <h3>👤 主页头像与简介</h3>
                        <div class="avatar-preview" id="avatarPreview">👨‍💻</div>
                        <div class="form-group">
                            <label>头像 Emoji</label>
                            <input type="text" id="avatarEmoji" value="👨‍💻" onchange="updateAvatarPreview()">
                        </div>
                        <div class="form-group">
                            <label>显示名称</label>
                            <input type="text" id="displayName" value="Walt">
                        </div>
                        <div class="form-group">
                            <label>副标题</label>
                            <input type="text" id="tagline" value="// 供应链数智化运营专家">
                        </div>
                        <div class="form-group">
                            <label>个人简介</label>
                            <textarea id="bioText" rows="4">我热衷于 AI 大模型与自动化工具，喜欢把枯燥的工作变得高效。</textarea>
                        </div>
                        <button class="btn" onclick="saveProfile()">💾 保存</button>
                    </div>

                    <div class="settings-card">
                        <h3>📞 联系方式</h3>
                        <div class="form-group">
                            <label>邮箱</label>
                            <input type="email" id="contactEmail" value="****">
                        </div>
                        <div class="form-group">
                            <label>电话</label>
                            <input type="tel" id="contactPhone" value="***********">
                        </div>
                        <div class="form-group">
                            <label>微信</label>
                            <input type="text" id="contactWechat" value="****">
                        </div>
                        <div class="form-group">
                            <label>坐标</label>
                            <input type="text" id="contactLocation" value="****">
                        </div>
                        <button class="btn" onclick="saveContact()">💾 保存</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 获取密码：从 config.js 或默认
        const getPassword = () => {
            if (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.admin && SITE_CONFIG.admin.password) {
                return SITE_CONFIG.admin.password;
            }
            return 'Walt2026'; // 默认密码
        };

        let blogs = [];
        
        // 登录
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('passwordInput').value;
            if (password === getPassword()) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminPage').classList.add('active');
                loadSettings();
            } else {
                showToast('密码错误！', true);
            }
        });

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function logout() {
            document.getElementById('adminPage').classList.remove('active');
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('passwordInput').value = '';
        }

        function showSection(section) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.admin-nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + section).classList.add('active');
            event.target.classList.add('active');
        }

        function showBlogTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('blogListTab').style.display = tab === 'list' ? 'block' : 'none';
            document.getElementById('blogEditTab').style.display = tab === 'edit' ? 'block' : 'none';
        }

        // Markdown 预览
        document.getElementById('markdownEditor').addEventListener('input', function() {
            const md = this.value;
            document.getElementById('previewContent').innerHTML = simpleMarkdown(md);
        });

        function simpleMarkdown(text) {
            return text
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/`(.+?)`/g, '<code>$1</code>')
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
                .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
                .replace(/\n/g, '<br>');
        }

        function updateAvatarPreview() {
            document.getElementById('avatarPreview').textContent = document.getElementById('avatarEmoji').value;
        }

        function saveProfile() {
            const config = {
                profile: {
                    avatar: document.getElementById('avatarEmoji').value,
                    displayName: document.getElementById('displayName').value,
                    tagline: document.getElementById('tagline').value,
                    bio: document.getElementById('bioText').value,
                    location: "29岁 · ****"
                },
                contact: {
                    email: document.getElementById('contactEmail').value,
                    phone: document.getElementById('contactPhone').value,
                    wechat: document.getElementById('contactWechat').value,
                    location: document.getElementById('contactLocation').value
                },
                skills: ["AI / LLM", "Linux", "自动化", "数据分析", "效率工具", "写作"]
            };
            
            downloadConfig(config);
            showToast('个人简介已保存！');
        }

        function saveContact() {
            const config = {
                profile: {
                    avatar: document.getElementById('avatarEmoji').value,
                    displayName: document.getElementById('displayName').value,
                    tagline: document.getElementById('tagline').value,
                    bio: document.getElementById('bioText').value,
                    location: "29岁 · ****"
                },
                contact: {
                    email: document.getElementById('contactEmail').value,
                    phone: document.getElementById('contactPhone').value,
                    wechat: document.getElementById('contactWechat').value,
                    location: document.getElementById('contactLocation').value
                },
                skills: ["AI / LLM", "Linux", "自动化", "数据分析", "效率工具", "写作"]
            };
            
            downloadConfig(config);
            showToast('联系方式已保存！');
        }

        function downloadConfig(config) {
            const jsContent = `// 网站配置文件 - 请勿手动修改\nvar SITE_CONFIG = ${JSON.stringify(config, null, 4)};`;
            const blob = new Blob([jsContent], { type: "text/javascript" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "config.js";
            a.click();
            URL.revokeObjectURL(url);
        }

        function saveBlog() {
            const title = document.getElementById('articleTitle').value;
            const content = document.getElementById('markdownEditor').value;
            
            if (!title || !content) {
                showToast('请填写标题和内容！', true);
                return;
            }

            const blog = {
                title: title,
                category: document.getElementById('articleCategory').value,
                date: new Date().toISOString().split('T')[0],
                content: content
            };

            // 导出博客 HTML
            const html = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title} | Walt 的个人主页</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet" />
    <style>
        :root { --bg-dark: #0a0a0f; --bg-card: #12121a; --accent-green: #00ff9f; --accent-blue: #00d4ff; --text-primary: #e0e0e0; --text-secondary: #8a8a9a; --border-color: #2a2a3a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg-dark); color: var(--text-primary); line-height: 1.8; padding: 80px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 1.8rem; margin-bottom: 20px; color: var(--accent-green); }
        h2 { font-size: 1.4rem; margin: 40px 0 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); }
        p { margin-bottom: 20px; color: var(--text-secondary); }
        blockquote { border-left: 4px solid var(--accent-blue); padding-left: 20px; margin: 20px 0; font-style: italic; }
        .back-link { display: inline-block; margin-bottom: 30px; color: var(--accent-blue); text-decoration: none; }
        footer { text-align: center; padding: 40px 0; border-top: 1px solid var(--border-color); margin-top: 60px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <a href="../blog.html" class="back-link">← 返回博客列表</a>
        <h1>${title}</h1>
        <p style="color: var(--text-secondary); margin-bottom: 40px;">📅 ${blog.date} | ✍️ Walt</p>
        <div class="content">${simpleMarkdown(content)}</div>
    </div>
    <footer><p>© 2026 Walt — All rights reserved</p></footer>
</body>
</html>`;

            const blob = new Blob([html], { type: "text/html" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = title.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '-') + '.html';
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('文章已导出，请上传到 blog/ 目录！');
            showBlogTab('list');
            
            document.getElementById('articleTitle').value = '';
            document.getElementById('markdownEditor').value = '';
        }

        function loadSettings() {
            if (typeof SITE_CONFIG !== 'undefined') {
                if (SITE_CONFIG.profile) {
                    document.getElementById('avatarEmoji').value = SITE_CONFIG.profile.avatar || '👨‍💻';
                    document.getElementById('displayName').value = SITE_CONFIG.profile.displayName || 'Walt';
                    document.getElementById('tagline').value = SITE_CONFIG.profile.tagline || '';
                    document.getElementById('bioText').value = SITE_CONFIG.profile.bio || '';
                    document.getElementById('avatarPreview').textContent = SITE_CONFIG.profile.avatar || '👨‍💻';
                }
                if (SITE_CONFIG.contact) {
                    document.getElementById('contactEmail').value = SITE_CONFIG.contact.email || '****';
                    document.getElementById('contactPhone').value = SITE_CONFIG.contact.phone || '***********';
                    document.getElementById('contactWechat').value = SITE_CONFIG.contact.wechat || '****';
                    document.getElementById('contactLocation').value = SITE_CONFIG.contact.location || '****';
                }
            }
        }
    </script>
</body>
</html>
